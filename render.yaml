services:
  - type: web
    name: gamead-insight
    env: python
    plan: free
    region: oregon  # 或 singapore (新加坡更靠近中国)
    branch: master
    buildCommand: |
      cd backend && pip install -r requirements.txt
      cd ../frontend && npm install && npm run build
      mkdir -p ../backend/static
      cp -r dist/* ../backend/static/
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: WECOM_WEBHOOK
        value: "https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=5ddaeb33-1d1d-4387-a347-3ecc1f62de24"
    healthCheckPath: /api/status
